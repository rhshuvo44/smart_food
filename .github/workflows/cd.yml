name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
          echo "Target: staging-server"
          # Override this with your deployment method:
          # SSH:
          #   ssh deploy@staging-server "cd /opt/smartfood && docker compose pull backend && docker compose up -d backend"
          # Ansible:
          #   ansible-playbook deploy.yml -e image_tag=${{ github.sha }}
          # Kubernetes:
          #   kubectl set image deployment/backend backend=ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Smoke test
        run: |
          echo "Running smoke tests..."
          # Replace with actual smoke test:
          # curl -f --retry 5 --retry-delay 10 --retry-connrefused https://staging.smartfood.com/api/v1/health
          echo "Smoke tests passed"

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
            {
              "channel": "#deployments",
              "text": "Deployment ${{ job.status == 'success' && 'succeeded' || 'failed' }}: ${{ github.repository }}@${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment ${{ job.status == 'success' && ':white_check_mark: Succeeded' || ':x: Failed' }}*\\n*Repo:* ${{ github.repository }}\\n*Ref:* ${{ github.sha }}\\n*Actor:* ${{ github.actor }}\\n*Image:* ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
