name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,MONGODB_URI,CORS_ORIGIN
        env:
          IMAGE_TAG: ${{ github.sha }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        script: |
          cd /opt/smartfood
          docker compose pull backend
          cat > backend/.env.production << EOF
          NODE_ENV=production
          PORT=3000
          MONGODB_URI=${MONGODB_URI}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          CORS_ORIGIN=${CORS_ORIGIN}
          LOG_LEVEL=info
          EOF
          docker compose -f docker-compose.prod.yml up -d backend

      - name: Smoke test
        run: |
          sleep 10
          curl -f --retry 10 --retry-delay 5 --retry-connrefused \
            https://${{ secrets.STAGING_DOMAIN }}/api/v1/health || \
            curl -f --retry 5 --retry-delay 5 http://localhost:3000/api/v1/health

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
            {
              "channel": "#deployments",
              "text": "Deployment ${{ job.status == 'success' && 'succeeded' || 'failed' }}: ${{ github.repository }}@${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment ${{ job.status == 'success' && ':white_check_mark: Succeeded' || ':x: Failed' }}*\\n*Repo:* ${{ github.repository }}\\n*Ref:* ${{ github.sha }}\\n*Actor:* ${{ github.actor }}\\n*Image:* ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
