version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smartfood-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartfood_dev
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smartfood

  backend:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    container_name: smartfood-backend
    ports:
      - '3000:3000'
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/smartfood_dev
      CORS_ORIGIN: http://localhost:8081
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - smartfood

networks:
  smartfood:
    driver: bridge

volumes:
  mongodb_data:
